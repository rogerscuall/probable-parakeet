slug: arista_evpn_vxlan
name: Arista EVPN VXLAN Data Center Fabric
description: AVD-based EVPN VXLAN fabric design for modern data center networks
version: "2.0.0"

# This config mirrors the Arista AVD (Ansible Validated Designs) data model:
#   Fabric        -> fabric-wide group_vars (fabric_name, protocols, mgmt, MTU, DNS/NTP)
#   NodeTypes     -> node_type defaults (spine/l3leaf/l2leaf platform, pools, MLAG, STP)
#   Devices       -> inventory hosts + per-node settings (id, mgmt_ip, MLAG group, ASN)
#   Tenants/VRFs/VLANs -> network services (tenant, VRF/VNI, SVIs and L2 VLANs)
#   ConnectedEndpoints -> server/endpoint adapters (ports, switches, vlans, port-channel)
#   CloudVision   -> CVP/CVaaS telemetry target
#
# Values AVD derives automatically are intentionally NOT asked for:
#   - per-device loopback / VTEP / router-id addresses (derived from pools + device id)
#   - per-device management mask and ansible_host (mgmt_ip + fabric mgmt_prefix_length)
#   - VRF route distinguishers / route targets (derived from VNIs)
#   - per-VLAN VNIs (derived from tenant mac_vrf_vni_base + vlan_id)
#   - uplink/downlink interface assignments (AVD default_interfaces; per-device
#     uplink_switch_interfaces is an optional override only)

labels:
  # Fabric-wide settings - Required
  - id: fabric
    name: Fabric Settings
    description: Fabric-wide underlay, overlay, and management settings
    explanation: |
      Fabric-wide settings apply to every device in the EVPN VXLAN fabric
      and map to the AVD fabric-level group variables.

      **What you provide (one row):**
      - Fabric name (the Ansible fabric container name, e.g. FABRIC)
      - Underlay and overlay routing protocols (eBGP/eBGP is the
        recommended Arista design)
      - Management default gateway and a single prefix length applied to
        every device management IP
      - Point-to-point uplink MTU (9214 for hardware, 1500-1600 for
        vEOS/cEOS labs)
      - Optional DNS and NTP servers

      **What is derived automatically:**
      - Per-device management masks (mgmt_ip + mgmt_prefix_length)
      - BGP peer-group structure and passwords
      - P2P underlay addressing (from the node-type uplink pool)
    required: true
    default: true
    menu:
      group: Fabric Architecture
      order: 1
    content:
      markdown_files:
        - BGPAddressFamilies.md
        - EVPNRouteTypes.md
      xlsx_sheets:
        - Fabric
      validation:
        - sheet: Fabric
          column: fabric_name
          field_type: identifier
          required: true
        - sheet: Fabric
          column: underlay_routing_protocol
          field_type: enum
          options:
            - ebgp
            - ospf
            - isis
          required: true
        - sheet: Fabric
          column: overlay_routing_protocol
          field_type: enum
          options:
            - ebgp
            - ibgp
          required: true
        - sheet: Fabric
          column: mgmt_gateway
          field_type: ipv4
          required: true
        - sheet: Fabric
          column: mgmt_prefix_length
          field_type: positive_integer
          required: true
        - sheet: Fabric
          column: p2p_uplinks_mtu
          field_type: positive_integer
          required: false
        - sheet: Fabric
          column: dns_server
          field_type: ipv4
          required: false
        - sheet: Fabric
          column: ntp_server
          field_type: hostname
          required: false

  # Topology - Required
  - id: topology
    name: Fabric Topology
    description: Node-type defaults and per-device definitions
    explanation: |
      The fabric topology is described in two compact sheets that map
      directly to the AVD node_type data model.

      **NodeTypes (one row per role: spine, l3leaf, l2leaf):**
      - Platform (cEOS-lab, vEOS-lab, 7280R3, ...)
      - Shared BGP ASN (spines share one ASN in the Arista eBGP design;
        leave blank for leaves - their ASN is set per MLAG group)
      - IPv4 pools: Loopback0, VTEP loopback, P2P uplinks, MLAG peer and
        MLAG iBGP peering. Each device's addresses are carved from these
        pools using its device id - individual IPs are never requested.
      - Loopback offset when two roles share a loopback pool
      - Virtual router MAC and spanning-tree defaults for leaves
      - Uplink switches (defaults to every spine when left blank)

      **Devices (one row per switch):**
      - Hostname, node type, and a unique numeric id per role
      - Management IP without mask (the fabric-wide prefix length is
        applied, and the same address is reused for Ansible connectivity)
      - MLAG node group: give the same group name to exactly two leaves
        to form an MLAG pair
      - BGP ASN per MLAG group (first row of the group is sufficient)
      - Optional uplink switch interface override (comma-separated,
        one per uplink switch) when the AVD default port allocation
        does not match the cabling
    required: true
    default: true
    depends_on:
      - fabric
    menu:
      group: Fabric Architecture
      order: 2
    content:
      markdown_files:
        - SpineLayerOverview.md
        - LeafLayerOverview.md
        - EVPNRouteReflectors.md
        - VXLANandVTEP.md
      xlsx_sheets:
        - NodeTypes
        - Devices
      validation:
        - sheet: NodeTypes
          column: node_type
          field_type: enum
          options:
            - spine
            - l3leaf
            - l2leaf
          required: true
        - sheet: NodeTypes
          column: platform
          field_type: identifier
          required: true
        - sheet: NodeTypes
          column: bgp_as
          field_type: asn
          required: false
        - sheet: NodeTypes
          column: loopback_ipv4_pool
          field_type: cidr
          required: false
        - sheet: NodeTypes
          column: loopback_ipv4_offset
          field_type: integer
          required: false
        - sheet: NodeTypes
          column: vtep_loopback_ipv4_pool
          field_type: cidr
          required: false
        - sheet: NodeTypes
          column: uplink_ipv4_pool
          field_type: cidr
          required: false
        - sheet: NodeTypes
          column: mlag_peer_ipv4_pool
          field_type: cidr
          required: false
        - sheet: NodeTypes
          column: mlag_peer_l3_ipv4_pool
          field_type: cidr
          required: false
        - sheet: NodeTypes
          column: virtual_router_mac_address
          field_type: mac_address
          required: false
        - sheet: NodeTypes
          column: spanning_tree_mode
          field_type: enum
          options:
            - mstp
            - rstp
            - rapid-pvst
            - none
          required: false
        - sheet: NodeTypes
          column: spanning_tree_priority
          field_type: integer
          required: false
        - sheet: NodeTypes
          column: uplink_switches
          field_type: identifier_list
          required: false
        - sheet: Devices
          column: hostname
          field_type: identifier
          required: true
        - sheet: Devices
          column: node_type
          field_type: enum
          options:
            - spine
            - l3leaf
            - l2leaf
          required: true
        - sheet: Devices
          column: id
          field_type: positive_integer
          required: true
        - sheet: Devices
          column: mgmt_ip
          field_type: ipv4
          required: true
        - sheet: Devices
          column: node_group
          field_type: identifier
          required: false
        - sheet: Devices
          column: bgp_as
          field_type: asn
          required: false
        - sheet: Devices
          column: uplink_switch_interfaces
          field_type: identifier_list
          required: false

  # Network Services - Required
  - id: network_services
    name: Network Services
    description: Tenants, VRFs, SVIs, and layer 2 VLANs
    explanation: |
      Network services describe the overlay segmentation and map to the
      AVD tenants data model.

      **Tenants (one row per tenant):**
      - Tenant name and mac_vrf_vni_base. Every VLAN VNI in the tenant is
        derived as mac_vrf_vni_base + vlan_id, so per-VLAN VNIs are never
        requested.

      **VRFs (one row per VRF):**
      - Owning tenant, VRF name, and VRF VNI. Route distinguishers and
        route targets are derived automatically by AVD.
      - Optional VTEP diagnostic loopback number and loopback IP range
        (a unique address is carved per leaf from the range)

      **VLANs (one row per VLAN):**
      - Owning tenant and VLAN ID
      - VRF and anycast gateway (ip_address_virtual) for routed SVIs;
        leave both blank for pure layer 2 VLANs bridged across the fabric
      - Optional VLAN name (auto-generated when blank)
    required: true
    default: true
    depends_on:
      - topology
    menu:
      group: Overlay Network
      order: 10
    content:
      markdown_files:
        - VRFsAndTenantIsolation.md
        - VLANtoVXLANMapping.md
        - AnycastGateway.md
      xlsx_sheets:
        - Tenants
        - VRFs
        - VLANs
      validation:
        - sheet: Tenants
          column: tenant_name
          field_type: identifier
          required: true
        - sheet: Tenants
          column: mac_vrf_vni_base
          field_type: positive_integer
          required: true
        - sheet: VRFs
          column: tenant
          field_type: identifier
          required: true
        - sheet: VRFs
          column: vrf_name
          field_type: identifier
          required: true
        - sheet: VRFs
          column: vrf_vni
          field_type: vni
          required: true
        - sheet: VRFs
          column: vtep_diagnostic_loopback
          field_type: positive_integer
          required: false
        - sheet: VRFs
          column: vtep_diagnostic_ip_range
          field_type: cidr
          required: false
        - sheet: VLANs
          column: tenant
          field_type: identifier
          required: true
        - sheet: VLANs
          column: vlan_id
          field_type: vlan
          required: true
        - sheet: VLANs
          column: name
          field_type: identifier
          required: false
        - sheet: VLANs
          column: vrf
          field_type: identifier
          required: false
        - sheet: VLANs
          column: ip_address_virtual
          field_type: ipv4_with_mask
          required: false

  # Connected Endpoints - Optional
  - id: connected_endpoints
    name: Connected Endpoints
    description: Servers and appliances attached to leaf switches
    explanation: |
      Connected endpoints describe how servers, firewalls, and other
      devices attach to the leaf layer, mapping to the AVD
      connected_endpoints data model.

      **Each row is one adapter (a set of links configured identically):**
      - Endpoint name and its ports (e.g. Ethernet1,Ethernet2)
      - Switches and switch ports the endpoint connects to - lists are
        comma-separated and must have the same length (one entry per link)
      - Allowed VLANs (single IDs and ranges, e.g. 11-13,21,25,31)
      - Port mode (access or trunk)
      - Optional port-channel mode (active/passive/on) to bundle the
        links - across an MLAG pair this creates an MLAG port-channel
      - Optional spanning-tree portfast setting (edge for hosts)
    required: false
    default: true
    depends_on:
      - network_services
    menu:
      group: Endpoints
      order: 20
    content:
      markdown_files:
        - ConnectedEndpoints.md
      xlsx_sheets:
        - ConnectedEndpoints
      validation:
        - sheet: ConnectedEndpoints
          column: endpoint_name
          field_type: identifier
          required: true
        - sheet: ConnectedEndpoints
          column: endpoint_ports
          field_type: identifier_list
          required: true
        - sheet: ConnectedEndpoints
          column: switches
          field_type: identifier_list
          required: true
        - sheet: ConnectedEndpoints
          column: switch_ports
          field_type: identifier_list
          required: true
        - sheet: ConnectedEndpoints
          column: vlans
          field_type: vlan_list
          required: true
        - sheet: ConnectedEndpoints
          column: mode
          field_type: enum
          options:
            - access
            - trunk
          required: true
        - sheet: ConnectedEndpoints
          column: port_channel_mode
          field_type: enum
          options:
            - active
            - passive
            - "on"
          required: false
        - sheet: ConnectedEndpoints
          column: spanning_tree_portfast
          field_type: enum
          options:
            - edge
            - network
          required: false

  # CloudVision - Optional
  - id: cloudvision
    name: CloudVision Telemetry
    description: CloudVision Portal / CVaaS streaming telemetry target
    explanation: |
      CloudVision integration streams device state and telemetry to a
      CloudVision Portal (on-prem CVP) or CVaaS instance and enables
      change-control based deployment.

      **What you provide (one row):**
      - CloudVision server (hostname for CVaaS, e.g. apiserver.arista.io,
        or the on-prem CVP address with port, e.g. 172.20.20.100:9910)
      - Optional VRF used to reach CloudVision (typically MGMT)

      **What is derived automatically:**
      - TerminAttr daemon configuration (smash excludes, auth method)
      - Device onboarding token handling
    required: false
    default: true
    depends_on:
      - fabric
    menu:
      group: Operations
      order: 30
    content:
      markdown_files:
        - MonitoringOverview.md
        - StreamingTelemetry.md
      xlsx_sheets:
        - CloudVision
      validation:
        - sheet: CloudVision
          column: cv_server
          field_type: hostname
          required: true
        - sheet: CloudVision
          column: cv_vrf
          field_type: identifier
          required: false
